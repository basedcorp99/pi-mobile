<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 420) rotate(90) scale(520)">
      <stop offset="0%" stop-color="#123524" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#08110d" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="piGrad" x1="280" y1="260" x2="760" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9cffb5"/>
      <stop offset="45%" stop-color="#4ce58a"/>
      <stop offset="100%" stop-color="#1fae62"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.14  0 0 0 0 0.95  0 0 0 0 0.44  0 0 0 0.9 0" result="greenGlow"/>
      <feMerge>
        <feMergeNode in="greenGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="220" fill="url(#bgGlow)"/>
  <circle cx="512" cy="512" r="352" fill="#0a1711" opacity="0.65"/>
  <circle cx="512" cy="512" r="340" stroke="#124b31" stroke-width="10" opacity="0.45"/>
  <circle cx="512" cy="512" r="280" stroke="#1b6d46" stroke-width="2" opacity="0.35" stroke-dasharray="8 14"/>

  <g filter="url(#glow)">
    <text x="512" y="648" text-anchor="middle" font-size="520" font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="url(#piGrad)">π</text>
  </g>

  <circle cx="736" cy="310" r="18" fill="#8cffab" opacity="0.5"/>
  <circle cx="282" cy="732" r="10" fill="#8cffab" opacity="0.35"/>
</svg>
