<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b2a1a" />
  <title>pi</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="/styles.css?v=1776110401" />
</head>
<body>

  <div class="app-header">
    <div class="app-header-left">
      <button class="hbtn" id="btn-menu-header" title="Sessions" aria-label="Sessions">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="4" y1="6" x2="20" y2="6"/>
          <line x1="4" y1="12" x2="20" y2="12"/>
          <line x1="4" y1="18" x2="20" y2="18"/>
        </svg>
      </button>
      <span class="app-logo">π</span>
      <button class="hbtn" id="btn-theme" title="Toggle light/dark">☀</button>
      <button class="hbtn" id="btn-settings" title="Settings" aria-label="Settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h.01A1.65 1.65 0 0 0 10 3.09V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
	    <div class="app-header-right">
	      <button class="top-btn top-select" id="btn-model" title="Model">
	        <span class="txt">Model</span>
	        <span class="sel" id="lbl-model">—</span>
	        <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
	      </button>
	      <button class="top-btn top-select" id="btn-thinking" title="Thinking level">
	        <span class="txt">Thinking</span>
	        <span class="sel" id="lbl-thinking">—</span>
	        <span class="ico" aria-hidden="true" title="Thinking level">
	          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
	            <path d="M9 18h6"/>
	            <path d="M10 22h4"/>
	            <path d="M8 14c-1.7-1.3-3-3.4-3-6a7 7 0 1 1 14 0c0 2.6-1.3 4.7-3 6-.8.6-1.5 1.6-1.7 2.6L14 18h-4l-.3-1.4c-.2-1-.9-2-1.7-2.6z"/>
	          </svg>
	        </span>
	        <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
	      </button>
	      <button class="top-btn" id="btn-terminal" title="Toggle terminal pane" aria-label="Terminal">
	        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16v12H4z"/><path d="M8 10l2 2-2 2"/><path d="M12 16h4"/></svg>
	        <span class="txt">Terminal</span>
	      </button>
	      <button class="top-btn" id="btn-takeover" title="Take over control">
	        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M13 5l7 7-7 7"/></svg>
	        <span class="txt">Take over</span>
	      </button>
      <button class="top-btn warn" id="btn-abort" title="Abort current run (Esc)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12"/></svg>
        <span class="txt">Abort</span>
      </button>
      <button class="top-btn" id="btn-compact" title="Compact conversation context">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 4H4v4"/><path d="M16 4h4v4"/><path d="M8 20H4v-4"/><path d="M16 20h4v-4"/></svg>
        <span class="txt">Compact</span>
      </button>
      <button class="top-btn" id="btn-release" title="Release web runtime for native CLI">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v10"/><path d="M18.36 6.64a9 9 0 1 1-12.72 0"/></svg>
        <span class="txt">Release</span>
      </button>
      <button class="top-btn" id="btn-load-more" title="Load full session history" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14"/><path d="M5 12l7 7 7-7"/></svg>
        <span class="txt">Load more</span>
      </button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

	    <nav class="sidebar">
	      <div class="sidebar-hdr">
	        <div class="sidebar-label" id="sidebar-label">Active</div>
	        <div class="sidebar-actions">
	          <button class="new-btn" id="btn-sidebar-left"></button>
	          <button class="new-btn" id="btn-sidebar-right"></button>
	        </div>
	      </div>
	      <div class="sessions" id="sessions-list"></div>
	    </nav>

    <div class="chat">
      <div class="keybar keybar-top" id="keybar-top">
      <button class="keybtn" id="kb-release" title="Release">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v10"/><path d="M18.36 6.64a9 9 0 1 1-12.72 0"/></svg>
        Release
      </button>
      <button class="keybtn" id="kb-terminal" title="Terminal">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16v12H4z"/><path d="M8 10l2 2-2 2"/><path d="M12 16h4"/></svg>
        Terminal
      </button>
      <button class="keybtn" id="kb-takeover" title="Take over">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M13 5l7 7-7 7"/></svg>
        Take over
      </button>
      <button class="keybtn warn" id="kb-abort" title="Abort">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12"/></svg>
        Abort
      </button>
      <button class="keybtn" id="kb-compact" title="Compact conversation context">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 4H4v4"/><path d="M16 4h4v4"/><path d="M8 20H4v-4"/><path d="M16 20h4v-4"/></svg>
        Compact
      </button>
    </div>

      <div class="msgs" id="msgs">
        <div class="msgs-spacer"></div>
        <div class="empty-state" id="empty-state">
          <div class="empty-logo">π</div>
          <div class="empty-title">No session selected</div>
          <div class="empty-hint">Open the sidebar to pick or create a session</div>
        </div>
      </div>
      <button class="scroll-bottom-btn" id="btn-scroll-bottom" type="button" title="Scroll to bottom" aria-label="Scroll to bottom" hidden>↓</button>

      <div class="working" id="working">
        <span class="work-spin" id="work-spin" aria-hidden="true">⠋</span>
        <span class="work-text">Working...</span>
      </div>

      <div class="attach-bar" id="attach-bar" style="display:none">
        <div class="attach-list" id="attach-list"></div>
        <button class="attach-btn secondary" id="btn-attach-clear" type="button" hidden>Clear</button>
      </div>
      <input type="file" id="image-input" accept="image/*" multiple hidden />

      <div class="editor-wrap">
        <div class="editor-border" id="eborder-top"></div>
        <div class="editor-row">
          <button class="composer-plus" id="btn-composer-plus" type="button" title="More actions" aria-label="More actions">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
          </button>
          <div class="editor-inner">
            <textarea class="editor-input" id="inp" rows="1" placeholder="Message…" enterkeyhint="send"></textarea>
            <div class="editor-btns">
              <button class="composer-circle voice-btn" id="btn-voice" type="button" title="Voice note">🎙</button>
              <button class="composer-circle composer-send" id="kb-enter" title="Send (Enter)" aria-label="Send">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
              </button>
            </div>
          </div>
        </div>
        <div class="composer-actions" id="composer-actions" hidden>
          <button class="composer-action-item" id="btn-commands" type="button">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 17l6-6-6-6"/><path d="M12 19h8"/></svg>
            <span>Commands</span>
          </button>
          <button class="composer-action-item" id="btn-history" type="button">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>History</span>
          </button>
          <button class="composer-action-item" id="btn-last-voice" type="button" hidden>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 1 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M19 11a7 7 0 0 1-14 0"/><path d="M12 18v4"/><path d="M8 22h8"/></svg>
            <span>Last voice</span>
          </button>
          <button class="composer-action-item" id="btn-attach" type="button">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            <span>Attach</span>
          </button>
        </div>
        <div class="editor-border" id="eborder-bot"></div>
      </div>

      <div class="footer">
        <div class="footer-line" id="footer-line-1">—</div>
        <div class="footer-line" id="footer-line-2">
          <span id="footer-left-2"><span id="footer-cwd"></span><span id="footer-metrics">—</span></span>
          <span class="footer-right" id="footer-right-2">—</span>
        </div>
      </div>
    </div>

    <aside class="terminal-pane" id="terminal-pane" aria-label="Terminal pane">
      <div class="terminal-shell">
        <div class="terminal-head">
          <div class="terminal-head-left">
            <button class="terminal-head-btn terminal-head-icon-btn terminal-close-btn" id="btn-terminal-close" type="button" title="Hide terminal" aria-label="Hide terminal">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
                <path d="M6 6l12 12"/>
                <path d="M18 6L6 18"/>
              </svg>
            </button>
            <div class="terminal-tabs" id="terminal-tabs"></div>
            <button class="terminal-head-btn terminal-head-icon-btn terminal-tab-add" id="btn-terminal-new" type="button" title="New terminal tab" aria-label="New terminal tab">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
                <path d="M12 5v14"/>
                <path d="M5 12h14"/>
              </svg>
            </button>
          </div>
          <div class="terminal-head-actions">
            <button class="terminal-head-btn" id="btn-terminal-find" type="button" title="Find in terminal" aria-label="Find in terminal">Find</button>
            <button class="terminal-head-btn" id="btn-terminal-copy" type="button" title="Copy terminal selection" aria-label="Copy terminal selection">Copy</button>
            <button class="terminal-head-btn" id="btn-terminal-paste" type="button" title="Paste from clipboard" aria-label="Paste from clipboard">Paste</button>
          </div>
        </div>
        <div class="terminal-search" id="terminal-search" hidden>
          <input class="terminal-search-input" id="terminal-search-input" type="search" placeholder="Find in terminal…" enterkeyhint="search" />
          <button class="terminal-head-btn" id="btn-terminal-search-prev" type="button" title="Previous match" aria-label="Previous match">↑</button>
          <button class="terminal-head-btn" id="btn-terminal-search-next" type="button" title="Next match" aria-label="Next match">↓</button>
          <button class="terminal-head-btn" id="btn-terminal-search-close" type="button" title="Close search" aria-label="Close search">✕</button>
        </div>
        <div class="terminal-status" id="terminal-status">Open a session to start a terminal.</div>
        <div class="terminal-stage" id="terminal-stage">
          <div class="terminal-empty" id="terminal-empty">Open a session to start a terminal.</div>
        </div>
        <div class="terminal-mobile-keys" id="terminal-mobile-keys">
          <button class="terminal-key" id="terminal-key-ctrl" type="button">Ctrl</button>
          <button class="terminal-key" data-seq="\u001b" type="button">Esc</button>
          <button class="terminal-key" data-seq="\t" type="button">Tab</button>
          <button class="terminal-key" data-seq="\u001b[A" type="button">↑</button>
          <button class="terminal-key" data-seq="\u001b[B" type="button">↓</button>
          <button class="terminal-key" data-seq="\u001b[D" type="button">←</button>
          <button class="terminal-key" data-seq="\u001b[C" type="button">→</button>
          <button class="terminal-key" data-seq="\u001b[5~" type="button">PgUp</button>
          <button class="terminal-key" data-seq="\u001b[6~" type="button">PgDn</button>
        </div>
      </div>
    </aside>
  </div>

	  <div class="menu-overlay" id="menu-overlay">
	    <div class="menu-scrim" id="menu-scrim"></div>
	    <div class="menu-panel" id="menu-panel"></div>
	  </div>
	  <script type="module" src="/app.js?v=1776094201"></script>
	</body>
	</html>
